<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusConnect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="/">
                    <h2>CampusConnect</h2>
                </a>
            </div>
            <div class="nav-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/#about" class="nav-link">About</a>
                <a href="/#events" class="nav-link">Events</a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Welcome Back</h1>
                    <p>Login to access your CampusConnect dashboard</p>
                </div>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="role">Select Your Role</label>
                        <select id="role" name="role" required>
                            <option value="">Choose your role</option>
                            <option value="student">Student</option>
                            <option value="student-coordinator">Student Coordinator</option>
                            <option value="faculty-coordinator">Faculty Coordinator</option>
                        </select>
                    </div>

                    
                    <div class="form-group">
                        <label for="email">College Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter your college email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <small class="password-hint">Use your current account password</small>
                        <a href="#" id="forgotPasswordLink" class="forgot-password-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="login-btn">
                        <span class="btn-text">Login</span>
                        <span class="btn-loader" style="display: none;">Logging in...</span>
                    </button>
                </form>
                
                <div id="loginMessage" class="login-message"></div>

                <div id="forgotPasswordPanel" class="forgot-password-panel" style="display: none;">
                    <h3>Reset Password</h3>
                    <form id="forgotPasswordForm" class="login-form">
                        <div class="form-group">
                            <label for="resetEmail">Registered Email</label>
                            <input type="email" id="resetEmail" placeholder="Enter registered email" required>
                        </div>
                        <div class="form-group">
                            <label for="resetStudentNumber">Student Number</label>
                            <input type="text" id="resetStudentNumber" placeholder="Enter student number" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" placeholder="Enter new password" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmNewPassword">Confirm New Password</label>
                            <input type="password" id="confirmNewPassword" placeholder="Re-enter new password" required>
                        </div>
                        <button type="submit" class="login-btn">Update Password</button>
                        <button type="button" id="cancelForgotPassword" class="login-btn" style="margin-top: 8px; background: #6b7280;">Cancel</button>
                    </form>
                    <div id="forgotPasswordMessage" class="login-message"></div>
                </div>
                
                <div class="login-footer">
                    <p>Don't have an account? <a href="/signup">Sign up here</a></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Enhanced login functionality
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const loginMessage = document.getElementById('loginMessage');
            const loginBtn = document.querySelector('.login-btn');
            const btnText = document.querySelector('.btn-text');
            const btnLoader = document.querySelector('.btn-loader');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const forgotPasswordPanel = document.getElementById('forgotPasswordPanel');
            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            const forgotPasswordMessage = document.getElementById('forgotPasswordMessage');
            const cancelForgotPassword = document.getElementById('cancelForgotPassword');

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const role = document.getElementById('role').value;

                if (!email || !password || !role) {
                    showMessage('Please fill in all fields', 'error');
                    return;
                }

                // Show loading state
                setLoading(true);

                try {
                    const response = await fetch('/auth/login', {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ email, password })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        // Confirm server-side session and fetch authoritative user
                        try {
                            const meResp = await fetch('/auth/me', { credentials: 'include' });
                            if (meResp.ok) {
                                const meUser = await meResp.json();
                                window.currentUser = meUser;
                            }
                        } catch (e) {
                            // ignore
                        }

                        // Redirect based on role
                        let dashboardUrl = '';
                        switch((window.currentUser || result.user).role) {
                            case 'student':
                                dashboardUrl = '/student-dashboard';
                                break;
                            case 'student-coordinator':
                                dashboardUrl = '/student-coordinator-dashboard';
                                break;
                            case 'faculty-coordinator':
                                dashboardUrl = '/faculty-dashboard';
                                break;
                            default:
                                dashboardUrl = '/';
                        }

                        showMessage('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            window.location.href = dashboardUrl;
                        }, 1000);
                    } else {
                        showMessage(result.error || 'Login failed', 'error');
                    }
                } catch (error) {
                    showMessage('Network error. Please try again.', 'error');
                } finally {
                    setLoading(false);
                }
            });

            forgotPasswordLink.addEventListener('click', function(e) {
                e.preventDefault();
                forgotPasswordPanel.style.display = 'block';
            });

            cancelForgotPassword.addEventListener('click', function() {
                forgotPasswordPanel.style.display = 'none';
                forgotPasswordForm.reset();
                forgotPasswordMessage.style.display = 'none';
            });

            forgotPasswordForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = document.getElementById('resetEmail').value.trim();
                const studentNumber = document.getElementById('resetStudentNumber').value.trim();
                const newPassword = document.getElementById('newPassword').value;
                const confirmNewPassword = document.getElementById('confirmNewPassword').value;

                if (newPassword !== confirmNewPassword) {
                    showForgotPasswordMessage('New password and confirm password do not match', 'error');
                    return;
                }

                try {
                    const response = await fetch('/auth/forgot-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            email,
                            student_number: studentNumber,
                            new_password: newPassword
                        })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        showForgotPasswordMessage('Password updated successfully. Please login with your new password.', 'success');
                        document.getElementById('email').value = email;
                        document.getElementById('password').value = newPassword;
                    } else {
                        showForgotPasswordMessage(result.error || 'Failed to update password', 'error');
                    }
                } catch (error) {
                    showForgotPasswordMessage('Network error. Please try again.', 'error');
                }
            });

            function showMessage(message, type) {
                loginMessage.textContent = message;
                loginMessage.className = `login-message ${type}`;
                loginMessage.style.display = 'block';
            }

            function setLoading(loading) {
                if (loading) {
                    loginBtn.disabled = true;
                    btnText.style.display = 'none';
                    btnLoader.style.display = 'inline';
                } else {
                    loginBtn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                }
            }

            function showForgotPasswordMessage(message, type) {
                forgotPasswordMessage.textContent = message;
                forgotPasswordMessage.className = `login-message ${type}`;
                forgotPasswordMessage.style.display = 'block';
            }
        });

        // Demo credentials removed to avoid hardcoding sensitive defaults.
    </script>
</body>
</html>
