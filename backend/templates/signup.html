<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CampusConnect</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Additional styles for signup page */
        .signup-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .signup-header {
            margin-bottom: 30px;
        }

        .signup-header h1 {
            color: #2563eb;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #2563eb;
        }

        .btn-signup {
            background: #2563eb;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-signup:hover {
            background: #1d4ed8;
        }

        .btn-signup:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .login-link {
            margin-top: 20px;
            color: #64748b;
        }

        .login-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }

        .error-message {
            color: #ef4444;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            color: #16a34a;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .role-info {
            font-size: 12px;
            color: #64748b;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>Create Account</h1>
            <p>Join CampusConnect to manage events and activities</p>
        </div>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="signup-form">
            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role" required>
                    <option value="">Select your role</option>
                </select>
                <div id="role-info" class="role-info"></div>
            </div>

            <div id="dynamic-fields"></div>

            <button type="submit" class="btn-signup" id="signup-btn">Sign Up</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('signup-form');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            const signupBtn = document.getElementById('signup-btn');

            // Fetch roles config and render form dynamically
            let rolesConfig = null;
            async function loadRoles() {
                try {
                    const resp = await fetch('/api/roles');
                    if (!resp.ok) return;
                    const json = await resp.json();
                    rolesConfig = json.roles || [];
                    const roleSelect = document.getElementById('role');
                    // populate
                    rolesConfig.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = r.key;
                        opt.textContent = r.label;
                        roleSelect.appendChild(opt);
                    });
                } catch (e) {
                    console.error('Failed to load roles', e);
                }
            }

            function clearDynamicFields() {
                const container = document.getElementById('dynamic-fields');
                container.innerHTML = '';
            }

            function renderRoleInfo(roleKey) {
                const infoDiv = document.getElementById('role-info');
                const role = (rolesConfig || []).find(r => r.key === roleKey);
                infoDiv.textContent = role ? role.description || '' : '';
            }

            // Render the form fields based on selected role
            function renderFormForRole(roleKey) {
                clearDynamicFields();
                if (!roleKey) return;

                const container = document.getElementById('dynamic-fields');
                // Common fields mapping per role
                const isStudent = roleKey === 'student' || roleKey === 'student-coordinator';
                const isFaculty = roleKey === 'faculty-coordinator';

                // Full Name
                const fgName = document.createElement('div');
                fgName.className = 'form-group';
                const lblName = document.createElement('label');
                lblName.setAttribute('for', 'name');
                lblName.textContent = 'Full Name';
                fgName.appendChild(lblName);
                const inpName = document.createElement('input');
                inpName.type = 'text';
                inpName.id = 'name';
                inpName.name = 'name';
                inpName.placeholder = 'Enter your full name';
                inpName.required = true;
                fgName.appendChild(inpName);
                container.appendChild(fgName);

                // ID field - student number or faculty id
                const fgId = document.createElement('div');
                fgId.className = 'form-group';
                const lblId = document.createElement('label');
                lblId.setAttribute('for', 'student_number');
                lblId.textContent = isFaculty ? 'Faculty ID' : 'Registered Number';
                fgId.appendChild(lblId);
                const inpId = document.createElement('input');
                inpId.type = 'text';
                inpId.id = 'student_number';
                inpId.name = 'student_number';
                inpId.placeholder = isFaculty ? 'Enter your faculty ID' : 'Enter your registered number';
                inpId.required = true;
                fgId.appendChild(inpId);
                container.appendChild(fgId);

                // Email
                const fgEmail = document.createElement('div');
                fgEmail.className = 'form-group';
                const lblEmail = document.createElement('label');
                lblEmail.setAttribute('for', 'email');
                lblEmail.textContent = 'Email Address';
                fgEmail.appendChild(lblEmail);
                const inpEmail = document.createElement('input');
                inpEmail.type = 'email';
                inpEmail.id = 'email';
                inpEmail.name = 'email';
                inpEmail.placeholder = 'Enter your email address';
                inpEmail.required = true;
                fgEmail.appendChild(inpEmail);
                container.appendChild(fgEmail);

                // Password
                const fgPass = document.createElement('div');
                fgPass.className = 'form-group';
                const lblPass = document.createElement('label');
                lblPass.setAttribute('for', 'password');
                lblPass.textContent = 'Password';
                fgPass.appendChild(lblPass);
                const inpPass = document.createElement('input');
                inpPass.type = 'password';
                inpPass.id = 'password';
                inpPass.name = 'password';
                inpPass.placeholder = 'Create a password';
                inpPass.required = true;
                inpPass.minLength = 6;
                fgPass.appendChild(inpPass);
                container.appendChild(fgPass);

                // Confirm Password
                const fgConfirm = document.createElement('div');
                fgConfirm.className = 'form-group';
                const lblConfirm = document.createElement('label');
                lblConfirm.setAttribute('for', 'confirm_password');
                lblConfirm.textContent = 'Confirm Password';
                fgConfirm.appendChild(lblConfirm);
                const inpConfirm = document.createElement('input');
                inpConfirm.type = 'password';
                inpConfirm.id = 'confirm_password';
                inpConfirm.name = 'confirm_password';
                inpConfirm.placeholder = 'Confirm your password';
                inpConfirm.required = true;
                inpConfirm.minLength = 6;
                fgConfirm.appendChild(inpConfirm);
                container.appendChild(fgConfirm);

                // Render any additional extra_fields defined by roles config
                if (rolesConfig) {
                    const role = rolesConfig.find(r => r.key === roleKey);
                    if (role && Array.isArray(role.extra_fields)) {
                        role.extra_fields.forEach(field => {
                            const fg = document.createElement('div');
                            fg.className = 'form-group';
                            const label = document.createElement('label');
                            label.setAttribute('for', field.name);
                            label.textContent = field.label;
                            fg.appendChild(label);
                            const input = document.createElement('input');
                            input.type = field.type || 'text';
                            input.id = field.name;
                            input.name = field.name;
                            input.placeholder = field.placeholder || '';
                            if (field.required) input.required = true;
                            fg.appendChild(input);
                            container.appendChild(fg);
                        });
                    }
                }
            }

            document.getElementById('role').addEventListener('change', function(e) {
                renderRoleInfo(e.target.value);
                renderFormForRole(e.target.value);
            });

            loadRoles();

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Show loading state
                signupBtn.disabled = true;
                signupBtn.textContent = 'Creating Account...';
                errorDiv.style.display = 'none';
                successDiv.style.display = 'none';

                const formData = new FormData(form);
                const data = {
                    student_number: formData.get('student_number'),
                    name: formData.get('name'),
                    email: formData.get('email'),
                    role: formData.get('role'),
                    password: formData.get('password'),
                    confirm_password: formData.get('confirm_password')
                };

                // Include any extra dynamic fields in payload
                if (rolesConfig) {
                    const role = rolesConfig.find(r => r.key === data.role);
                    if (role && role.extra_fields) {
                        role.extra_fields.forEach(f => {
                            const val = formData.get(f.name);
                            if (val !== null) data[f.name] = val;
                        });
                    }
                }

                // Validate passwords match
                if (data.password !== data.confirm_password) {
                    showError('Passwords do not match');
                    resetForm();
                    return;
                }

                try {
                    const response = await fetch('/auth/signup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });

                    const result = await response.json();

                    if (response.ok) {
                        showSuccess('Account created successfully! Redirecting to login...');
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        showError(result.error || 'Registration failed');
                    }
                } catch (error) {
                    showError('Network error. Please try again.');
                } finally {
                    resetForm();
                }
            });

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
            }

            function showSuccess(message) {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
            }

            function resetForm() {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Sign Up';
            }
        });
    </script>
</body>
</html>
